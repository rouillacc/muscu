<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EPS Muscu Connect+</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --haut:   #00e676;
            --bas:    #ff1744;
            --tronc:  #ffd740;
            --cardio: #40c4ff;
            --prof:   #d500f9;
            --bg:     #0d0d0d;
            --surface: #161616;
            --surface2: #1e1e1e;
            --border: rgba(255,255,255,0.08);
            --text:   #f0f0f0;
            --muted:  #666;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 40px;
            min-height: 100vh;
        }

        .container { max-width: 680px; margin: auto; padding: 12px 14px; }

        .banner {
            background: var(--surface);
            border-bottom: 2px solid var(--prof);
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: .04em;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .banner-dot { width: 8px; height: 8px; background: var(--prof); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 18px;
            margin: 12px 0;
            border: 1px solid var(--border);
            border-top: 4px solid var(--border);
            transition: border-top-color .3s;
        }
        .card h3, .card h4 { font-family: 'Bebas Neue', sans-serif; letter-spacing: .06em; font-size: 1.3em; margin: 0 0 12px; color: var(--text); }

        .z-haut  { border-top-color: var(--haut)  !important; }
        .z-bas   { border-top-color: var(--bas)   !important; }
        .z-tronc { border-top-color: var(--tronc) !important; }
        .z-cardio{ border-top-color: var(--cardio)!important; }

        .badge {
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .05em;
            text-transform: uppercase;
        }
        .bg-haut  { background: var(--haut);   color:#000; }
        .bg-bas   { background: var(--bas);    color:#fff; }
        .bg-tronc { background: var(--tronc);  color:#000; }
        .bg-cardio{ background: var(--cardio); color:#000; }

        input, select, textarea {
            width: 100%;
            padding: 13px 14px;
            margin: 6px 0;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 16px;
            background: var(--surface2);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color .2s;
            appearance: none;
        }
        input:focus, select:focus, textarea:focus { border-color: rgba(255,255,255,0.3); }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: .03em;
            transition: transform .12s, opacity .12s, box-shadow .2s;
        }
        button:active { transform: scale(.97); opacity: .9; }
        .btn-primary { background: var(--haut); color: #000; }
        .btn-danger  { background: var(--bas);  color: #fff; }
        .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-prof    { background: var(--prof); color: #fff; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        th { background: var(--surface2); color: var(--muted); font-size: 10px; letter-spacing: .07em; text-transform: uppercase; padding: 8px 6px; text-align: center; }
        td { border-bottom: 1px solid var(--border); padding: 9px 6px; text-align: center; color: #ccc; }
        tr.done td { color: var(--text); }
        tr.done td:nth-child(3) { color: var(--haut); font-weight: 700; }

        .progress-wrap { background: var(--surface2); border-radius: 8px; height: 6px; margin: 6px 0 12px; overflow: hidden; }
        .progress-bar  { height: 100%; background: var(--haut); border-radius: 8px; transition: width .5s cubic-bezier(.4,0,.2,1); }

        .rm-feedback { background: var(--surface2); border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-top: 8px; border-left: 3px solid var(--haut); display: none; }

        .live-feed { max-height: 220px; overflow-y: auto; background: #000; padding: 10px 14px; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 11px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 1999; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .modal-overlay.hidden { display: none !important; }
        .modal-box { background: #fff; color: #1a1a1a; border-radius: 18px; padding: 22px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.6); }
        .modal-box h3 { font-family: 'Bebas Neue'; font-size: 1.5em; margin: 0 0 14px; color: var(--prof); }
        .bilan-box { background: #f5f5f5; border: 1px dashed #ccc; border-radius: 8px; padding: 12px; font-family: 'Courier New', monospace; font-size: 12px; white-space: pre-wrap; color: #222; margin-bottom: 14px; }
        
        .chart-container { width: 100%; max-width: 280px; margin: 0 auto 15px; }

        .success-screen { text-align: center; padding: 30px 20px; }
        .success-icon { font-size: 64px; display: block; margin-bottom: 12px; animation: pop .4s cubic-bezier(.175,.885,.32,1.275); }
        @keyframes pop { from{transform:scale(.3);opacity:0} to{transform:scale(1);opacity:1} }
        
        .validation-msg { font-size: 12px; padding: 6px 10px; border-radius: 8px; margin-top: 6px; display: none; }
        .validation-msg.error { background: rgba(255,23,68,.15); color: #ff6b8a; display: block; }

        .hidden { display: none !important; }
        .row { display: flex; gap: 8px; }
        .row > * { flex: 1; }

        .zone-counters { display:flex; gap:8px; margin:10px 0; flex-wrap:wrap; }
        .zone-counter { flex:1; min-width:60px; background:var(--surface2); border-radius:10px; padding:8px; text-align:center; border:1px solid var(--border); }
        .zone-counter .zc-num { font-family:'Bebas Neue'; font-size:1.6em; line-height:1; }
        .zone-counter .zc-lbl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }

        #main-title { font-family: 'Bebas Neue', sans-serif; font-size: 2em; letter-spacing: .08em; margin: 16px 0 4px; color: var(--text); }
        .admin-link { font-size: 11px; color: #333; margin-top: 60px; cursor: pointer; text-align: center; border: 1px solid #2a2a2a; padding: 8px; width: 160px; margin-left: auto; margin-right: auto; border-radius: 6px; display: block; }
    </style>
</head>
<body>

<div id="lesson-banner" class="banner hidden">
    <div class="banner-dot"></div>
    SESSION EN COURS : <span id="cur-lesson-name" style="color:var(--prof)">---</span>
</div>

<div class="container">
    <h2 id="main-title">🏋️ Muscu Connect+</h2>

    <div id="auth-screen" class="card">
        <h3>Identification</h3>
        <select id="classe" onchange="majEleves()">
            <option value="">-- Classe --</option>
            <option>3A</option><option>3B</option><option>3C</option><option>3D</option>
        </select>
        <select id="eleve"><option value="">-- Numéro --</option></select>
        <button class="btn-primary" onclick="connexion()">Entrer →</button>
    </div>

    <div id="app-eleve" class="hidden">
        <div class="card" id="input-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <span id="user-info" style="font-weight:600; font-size:13px;"></span>
                <span onclick="location.reload()" style="color:var(--muted); font-size:12px; text-decoration:underline; cursor:pointer;">Quitter</span>
            </div>

            <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>

            <div class="zone-counters">
                <div class="zone-counter"><div class="zc-num" id="cnt-haut" style="color:var(--haut)">0</div><div class="zc-lbl">Haut</div></div>
                <div class="zone-counter"><div class="zc-num" id="cnt-bas"  style="color:var(--bas)">0</div><div class="zc-lbl">Bas</div></div>
                <div class="zone-counter"><div class="zc-num" id="cnt-tronc" style="color:var(--tronc)">0</div><div class="zc-lbl">Tronc</div></div>
                <div class="zone-counter"><div class="zc-num" id="cnt-cardio" style="color:var(--cardio)">0</div><div class="zc-lbl">Cardio</div></div>
            </div>

            <select id="atelier" onchange="majExercices()">
                <option value="">-- Choisir un atelier --</option>
                <optgroup label="💪 HAUT DU CORPS" data-zone="haut">
                    <option value="Pectoraux">Pectoraux</option>
                    <option value="Biceps">Biceps</option>
                    <option value="Triceps">Triceps</option>
                    <option value="Trapèzes">Trapèzes</option>
                </optgroup>
                <optgroup label="🦵 BAS DU CORPS" data-zone="bas">
                    <option value="Quadriceps">Quadriceps</option>
                    <option value="Ischios">Ischios</option>
                    <option value="Fessiers">Fessiers</option>
                    <option value="Mollets">Mollets</option>
                </optgroup>
                <optgroup label="🧘 TRONC" data-zone="tronc">
                    <option value="Abdominaux">Abdominaux</option>
                    <option value="Obliques">Obliques</option>
                    <option value="Grand Dorsal">Grand Dorsal</option>
                </optgroup>
                <optgroup label="❤️ CARDIO" data-zone="cardio">
                    <option value="Jumping Jack">Jumping Jack</option>
                    <option value="Mountain Climber">Mountain Climber</option>
                    <option value="Burpees">Burpees</option>
                </optgroup>
            </select>
            
            <select id="exercice" onchange="majUI()" class="hidden"></select>

            <div id="f-std" class="hidden">
                <div class="row">
                    <select id="kg" onchange="validateInputs()">
                        <option value="">-- Charge --</option>
                        <option value="PDC">Poids de corps (PDC)</option>
                    </select>
                    <input type="number" id="reps" placeholder="Reps" inputmode="numeric" oninput="validateInputs()">
                </div>
            </div>

            <div id="f-alt" class="hidden">
                <input type="number" id="val-alt" placeholder="Reps ou Secondes" inputmode="numeric">
            </div>
        
            <div id="f-elastique" class="hidden">
                <p style="font-size:12px; color:var(--muted); margin:6px 0;">Couleur de l'élastique :</p>
                <div style="display:flex; gap:6px; margin-bottom:10px;">
                    <div id="el-vert"   style="flex:1; padding:10px; border-radius:8px; background:#27ae60; color:#fff; text-align:center; font-weight:700; cursor:pointer;" onclick="selectElastique('Vert')">Vert</div>
                    <div id="el-rouge"  style="flex:1; padding:10px; border-radius:8px; background:#e74c3c; color:#fff; text-align:center; font-weight:700; cursor:pointer;" onclick="selectElastique('Rouge')">Rouge</div>
                    <div id="el-noir"   style="flex:1; padding:10px; border-radius:8px; background:#2c2c2c; color:#fff; text-align:center; font-weight:700; cursor:pointer;" onclick="selectElastique('Noir')">Noir</div>
                </div>
                <input type="hidden" id="val-elastique">
                <input type="number" id="reps-el" placeholder="Nombre de répétitions" inputmode="numeric">
            </div>

            <select id="ressenti">
                <option value="">-- Ressenti ? --</option>
                <option value="😄">😄 Facile</option>
                <option value="🙂">🙂 Bien</option>
                <option value="😫">😫 Difficile</option>
            </select>

            <div id="input-error" class="validation-msg error"></div>
            <div class="rm-feedback" id="rm-feedback"></div>
            <button class="btn-primary" onclick="sauverSérie()">✅ Valider l'atelier</button>
        </div>

        <div class="card">
            <h4>📊 Mon Tableau</h4>
            <table>
                <thead><tr><th>Z</th><th>Atelier</th><th>Exercice</th><th>Perf.</th><th>1RM</th><th>😊</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
            <button onclick="genererBilanVisuel(false)" class="btn-ghost" style="margin-top:14px;">🔍 Bilan Visuel / Radar</button>
            <button onclick="ouvrirBilanFinal()" class="btn-primary">📤 Envoyer au prof</button>
        </div>
    </div>

    <div id="app-prof" class="hidden">
        <div class="card" style="border-top-color: var(--prof);">
            <h3>🎓 Espace Professeur</h3>
            <input type="text" id="lesson-input" placeholder="Titre de la leçon">
            <div class="row">
                <button class="btn-prof" onclick="setSession(true)">▶ Démarrer</button>
                <button class="btn-danger" onclick="setSession(false)">■ Stopper</button>
            </div>
            <div id="live-feed" class="live-feed" style="margin-top:20px;"></div>
            <button onclick="location.reload()" class="btn-ghost" style="margin-top:20px;">← Retour</button>
        </div>
    </div>

    <span class="admin-link" onclick="accessProf()">Administration Prof</span>
</div>

<div id="modal-overlay" class="modal-overlay hidden" onclick="if(event.target.id==='modal-overlay') fermerModal()">
    <div class="modal-box">
        <div id="success-view" class="success-screen hidden">
            <span class="success-icon">✅</span>
            <h2>Séance envoyée !</h2>
            <button style="background:var(--prof); color:#fff; margin-top:16px;" onclick="location.reload()">Terminer</button>
        </div>

        <div id="bilan-view">
            <h3 id="modal-title">Mon Bilan</h3>
            <div class="chart-container"><canvas id="radarChart"></canvas></div>
            <div id="bilan-visual-area" class="bilan-box"></div>
            <div id="reflexive-area">
                <textarea id="bilan-texte" rows="3" placeholder="Note ton bilan de la leçon d'aujourd'hui"></textarea>
                <button onclick="confirmerEnvoi()" style="background:var(--prof); color:#fff;">Confirmer l'envoi</button>
            </div>
            <button onclick="fermerModal()" style="background:#eee; color:#333; margin-top:8px;">Fermer</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCEYWqZ9GGwWHZ4mEUS4HgaZL03hXlKpcE",
  authDomain: "muscu-3e.firebaseapp.com",
  projectId: "muscu-3e",
  storageBucket: "muscu-3e.firebasestorage.app",
  messagingSenderId: "1023879929115",
  appId: "1:1023879929115:web:bc4b71e0a647aaae1047be",
  databaseURL: "https://muscu-3e-default-rtdb.europe-west1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const rdb = firebase.database();

let user = "", lesson = "", dataEleve = {}, radarChartInstance = null;

const ALT_EXOS = ["Crunchs","Sit-Up","Hollow","Russian Twist","Touche Talons","Crunch Pédalos","Arlaud","Arlaud Dynamique","Chaise","Jumping Jack","Star Jump","Corde à Sauter","Mountain Climber Bloqué","Mountain Climber Dynamique","Mountain Climber Crossfit","Marche de l'Ours","Sprawl","Burpees","Relevé de Bassin","Relevé de Bassin 1 Jambe","Relevé de Bassin Dynamique","Fentes Bulgares","Fentes","Fentes Sautées","Squats Sautés","Montées Descentes"];
const ELASTIQUE_EXOS = ["Dips","Tirage Bras Tendus","Rameur Élastique"];

const EXERCICES = {
    "Pectoraux": { zone:"haut", list:["Pompes","Développé Couché","Butterfly"] },
    "Biceps": { zone:"haut", list:["Curl Biceps","Curl Marteau","Curl TRX"] },
    "Triceps": { zone:"haut", list:["Triceps Extension","Triceps Kicks","Dips"] },
    "Trapèzes": { zone:"haut", list:["Tirage Bras Tendus","Tirage Kettlebell","Presse Épaule"] },
    "Quadriceps": { zone:"bas", list:["Squats","Chaise","Squats Sautés"] },
    "Ischios": { zone:"bas", list:["Relevé de Bassin","Relevé de Bassin 1 Jambe","Relevé de Bassin Dynamique"] },
    "Fessiers": { zone:"bas", list:["Fentes Bulgares","Fentes","Fentes Sautées"] },
    "Mollets": { zone:"bas", list:["Montées Descentes","Montées avec Poids","Montées Kettlebell"] },
    "Abdominaux": { zone:"tronc", list:["Crunchs","Sit-Up","Hollow"] },
    "Obliques": { zone:"tronc", list:["Russian Twist","Touche Talons","Crunch Pédalos"] },
    "Grand Dorsal": { zone:"tronc", list:["Arlaud","Arlaud Dynamique","Rameur Élastique"] },
    "Jumping Jack": { zone:"cardio", list:["Jumping Jack","Star Jump","Corde à Sauter"] },
    "Mountain Climber": { zone:"cardio", list:["Mountain Climber Bloqué","Mountain Climber Dynamique","Mountain Climber Crossfit"] },
    "Burpees": { zone:"cardio", list:["Marche de l'Ours","Sprawl","Burpees"] }
};

const ateliers = {
    haut: ["Pectoraux","Biceps","Triceps","Trapèzes"],
    bas: ["Quadriceps","Ischios","Fessiers","Mollets"],
    tronc: ["Abdominaux","Obliques","Grand Dorsal"],
    cardio: ["Jumping Jack","Mountain Climber","Burpees"]
};

const kgSelect = document.getElementById("kg");
for(let i=1; i<=150; i++) {
    let opt = document.createElement("option");
    opt.value = i; opt.text = i + " kg";
    kgSelect.add(opt);
}

function majEleves() {
    const s = document.getElementById("eleve");
    s.innerHTML = '<option value="">-- Numéro --</option>';
    for (let i = 1; i <= 30; i++) s.innerHTML += `<option value="${i}">${i}</option>`;
}

function connexion() {
    const c = document.getElementById("classe").value;
    const e = document.getElementById("eleve").value;
    if (!c || !e) return;
    user = c + "_" + e;
    document.getElementById("auth-screen").classList.add("hidden");
    document.getElementById("app-eleve").classList.remove("hidden");
    document.getElementById("user-info").innerText = `👤 ${c} – n°${e}`;
    const saved = localStorage.getItem("session_" + user);
    if (saved) dataEleve = JSON.parse(saved);
    initTableau();
}

function initTableau() {
    const b = document.getElementById("table-body");
    b.innerHTML = "";
    Object.keys(ateliers).forEach(z => {
        ateliers[z].forEach(at => {
            const d = dataEleve[at] || null;
            b.innerHTML += `
                <tr class="${d?'done':''}">
                    <td><span class="badge bg-${z}">${z[0]}</span></td>
                    <td>${at}</td>
                    <td>${d?d.ex:'-'}</td>
                    <td style="color:var(--haut)">${d?d.p:'-'}</td>
                    <td>${d?d.rm:'-'}</td>
                    <td>${d?d.res:'-'}</td>
                </tr>`;
        });
    });
    updateProgress();
}

function majExercices() {
    const at = document.getElementById("atelier").value;
    const exSel = document.getElementById("exercice");
    if (!at) { exSel.classList.add("hidden"); return; }
    const { zone, list } = EXERCICES[at];
    exSel.innerHTML = '<option value="">-- Exercice --</option>' + list.map(e => `<option value="${e}">${e}</option>`).join("");
    exSel.classList.remove("hidden");
    document.getElementById("input-card").className = `card z-${zone}`;
}

function majUI() {
    const ex = document.getElementById("exercice").value;
    const isElastique = ELASTIQUE_EXOS.includes(ex);
    const isAlt = ALT_EXOS.includes(ex);
    document.getElementById("f-std").className = (!isAlt && !isElastique) ? "" : "hidden";
    document.getElementById("f-alt").className = (isAlt && !isElastique) ? "" : "hidden";
    document.getElementById("f-elastique").className = isElastique ? "" : "hidden";
}

function selectElastique(c) {
    document.getElementById("val-elastique").value = c;
    ["vert","rouge","noir"].forEach(id => document.getElementById("el-"+id).style.border = "none");
    document.getElementById("el-"+c.toLowerCase()).style.border = "2px solid white";
}

function validateInputs() {
    const kg = document.getElementById("kg").value;
    const reps = Number(document.getElementById("reps").value);
    const fb = document.getElementById("rm-feedback");
    
    if (kg !== "" && reps > 0) {
        let label = "", color = "", rmText = "";
        
        // Calcul 1RM si pas PDC et reps raisonnables
        if (kg !== "PDC" && reps <= 20) {
            const rm = Math.round(Number(kg) / (1.0278 - 0.0278 * reps));
            rmText = ` | 1RM : ${rm}kg`;
        }

        // Détermination du bandeau Force/Volume/Toni
        if (reps <= 6) { label = "FORCE"; color = "#ff1744"; }
        else if (reps <= 12) { label = "VOLUME / HYPERTROPHIE"; color = "#d500f9"; }
        else { label = "TONIFICATION / ENDURANCE"; color = "#00e676"; }

        fb.style.display = "block";
        fb.style.borderLeftColor = color;
        fb.innerHTML = `<b style="color:${color}">${label}</b>${rmText}`;
    } else {
        fb.style.display = "none";
    }
}

function sauverSérie() {
    const at = document.getElementById("atelier").value;
    const ex = document.getElementById("exercice").value;
    const res = document.getElementById("ressenti").value;
    const err = document.getElementById("input-error");
    if (!at || !ex || !res) { err.innerText = "⚠️ Incomplet"; err.style.display="block"; return; }

    let p = "", rm = "-";
    const z = EXERCICES[at].zone;

    if (ELASTIQUE_EXOS.includes(ex)) {
        const c = document.getElementById("val-elastique").value;
        const r = document.getElementById("reps-el").value;
        if(!c || !r) return;
        p = `Elas. ${c} × ${r}`;
    } else if (ALT_EXOS.includes(ex)) {
        const v = document.getElementById("val-alt").value;
        p = v + " reps/sec";
    } else {
        const kg = document.getElementById("kg").value;
        const reps = document.getElementById("reps").value;
        if(!kg || !reps) return;
        p = (kg === "PDC" ? "PDC" : kg + "kg") + " × " + reps;
        if (kg !== "PDC" && reps <= 20) rm = Math.round(kg / (1.0278 - 0.0278 * reps)) + " kg";
    }

    dataEleve[at] = { z, ex, p, rm, res, ts: Date.now() };
    localStorage.setItem("session_" + user, JSON.stringify(dataEleve));
    rdb.ref("live").push({ u: user, at, ex, p, res, z, ts: Date.now() });
    initTableau();
    
    document.getElementById("atelier").value = "";
    document.getElementById("exercice").classList.add("hidden");
    document.getElementById("f-std").classList.add("hidden");
    document.getElementById("f-alt").classList.add("hidden");
    document.getElementById("f-elastique").classList.add("hidden");
    document.getElementById("kg").value = "";
    document.getElementById("reps").value = "";
    document.getElementById("rm-feedback").style.display = "none";
}

function updateProgress() {
    const done = Object.keys(dataEleve).length;
    document.getElementById("progress-bar").style.width = (done/15*100) + "%";
    ["haut","bas","tronc","cardio"].forEach(z => {
        document.getElementById("cnt-"+z).innerText = Object.values(dataEleve).filter(d => d.z === z).length;
    });
}

function genererBilanVisuel(isForSending) {
    if (Object.keys(dataEleve).length === 0) return;
    setTimeout(() => {
        const ctx = document.getElementById('radarChart').getContext('2d');
        const vals = ['haut', 'bas', 'tronc', 'cardio'].map(z => Object.values(dataEleve).filter(d => d.z === z).length);
        if (radarChartInstance) radarChartInstance.destroy();
        radarChartInstance = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['Haut', 'Bas', 'Tronc', 'Cardio'],
                datasets: [{ data: vals, backgroundColor: 'rgba(213,0,249,0.2)', borderColor: '#d500f9' }]
            },
            options: { scales: { r: { beginAtZero: true, ticks: { display: false } } }, plugins: { legend: { display: false } } }
        });
    }, 100);

    let txt = `BILAN : ${user}\n`;
    Object.keys(dataEleve).forEach(at => {
        const d = dataEleve[at];
        txt += `• ${at} (${d.ex}): ${d.p}\n`;
    });
    document.getElementById("bilan-visual-area").innerText = txt;
    if(!isForSending) {
        document.getElementById("modal-overlay").classList.remove("hidden");
        document.getElementById("bilan-view").classList.remove("hidden");
        document.getElementById("success-view").classList.add("hidden");
    }
}

function ouvrirBilanFinal() {
    genererBilanVisuel(true);
    document.getElementById("reflexive-area").classList.remove("hidden");
    document.getElementById("modal-overlay").classList.remove("hidden");
}

function confirmerEnvoi() {
    const t = document.getElementById("bilan-texte").value;
    rdb.ref(`data/${lesson||'Seance'}/${user}`).set({ ateliers: dataEleve, bilan: t }).then(() => {
        localStorage.removeItem("session_" + user);
        document.getElementById("bilan-view").classList.add("hidden");
        document.getElementById("success-view").classList.remove("hidden");
    });
}

function fermerModal() { document.getElementById("modal-overlay").classList.add("hidden"); }

function accessProf() {
    if (prompt("Code :") === "16170") {
        document.getElementById("auth-screen").classList.add("hidden");
        document.getElementById("app-eleve").classList.add("hidden");
        document.getElementById("app-prof").classList.remove("hidden");
    }
}

function setSession(active) {
    lesson = document.getElementById("lesson-input").value;
    rdb.ref("config/active").set({ status: active, name: lesson });
}
</script>
</body>
</html>
