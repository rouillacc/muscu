<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EPS Muscu Connect+</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --haut:   #00e676;
            --bas:    #ff1744;
            --tronc:  #ffd740;
            --cardio: #40c4ff;
            --prof:   #d500f9;
            --bg:     #0d0d0d;
            --surface: #161616;
            --surface2: #1e1e1e;
            --border: rgba(255,255,255,0.08);
            --text:   #f0f0f0;
            --muted:  #666;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 40px;
            min-height: 100vh;
        }

        .container { max-width: 680px; margin: auto; padding: 12px 14px; }

        .banner {
            background: var(--surface);
            border-bottom: 2px solid var(--prof);
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: .04em;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .banner-dot { width: 8px; height: 8px; background: var(--prof); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 18px;
            margin: 12px 0;
            border: 1px solid var(--border);
            border-top: 4px solid var(--border);
            transition: border-top-color .3s;
        }
        .card h3, .card h4 { font-family: 'Bebas Neue', sans-serif; letter-spacing: .06em; font-size: 1.3em; margin: 0 0 12px; color: var(--text); }

        .z-haut  { border-top-color: var(--haut)  !important; }
        .z-bas   { border-top-color: var(--bas)   !important; }
        .z-tronc { border-top-color: var(--tronc) !important; }
        .z-cardio{ border-top-color: var(--cardio)!important; }

        .badge {
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .05em;
            text-transform: uppercase;
        }
        .bg-haut  { background: var(--haut);   color:#000; }
        .bg-bas   { background: var(--bas);    color:#fff; }
        .bg-tronc { background: var(--tronc);  color:#000; }
        .bg-cardio{ background: var(--cardio); color:#000; }

        input, select, textarea {
            width: 100%;
            padding: 13px 14px;
            margin: 6px 0;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 16px;
            background: var(--surface2);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color .2s;
            appearance: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            transition: transform .12s, opacity .12s;
        }
        button:active { transform: scale(.97); opacity: .9; }
        .btn-primary { background: var(--haut); color: #000; }
        .btn-danger  { background: var(--bas);  color: #fff; }
        .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-prof    { background: var(--prof); color: #fff; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        th { background: var(--surface2); color: var(--muted); font-size: 10px; padding: 8px 6px; text-align: center; }
        td { border-bottom: 1px solid var(--border); padding: 9px 6px; text-align: center; color: #ccc; }
        tr.done td { color: var(--text); }

        .progress-wrap { background: var(--surface2); border-radius: 8px; height: 6px; margin: 6px 0 12px; overflow: hidden; }
        .progress-bar  { height: 100%; background: var(--haut); border-radius: 8px; transition: width .5s; }

        .rm-feedback { background: var(--surface2); border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-top: 8px; border-left: 3px solid var(--haut); display: none; }

        .live-feed { max-height: 250px; overflow-y: auto; background: #000; padding: 10px 14px; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 11px; color: #00e676; border: 1px solid #222; }
        .live-entry { padding: 4px 0; border-bottom: 1px solid #111; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 1999; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .modal-box { background: #fff; color: #1a1a1a; border-radius: 18px; padding: 22px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        
        .hidden { display: none !important; }
        .row { display: flex; gap: 8px; }
        .row > * { flex: 1; }

        .zone-counters { display:flex; gap:8px; margin:10px 0; }
        .zone-counter { flex:1; background:var(--surface2); border-radius:10px; padding:8px; text-align:center; border:1px solid var(--border); }
        .zc-num { font-family:'Bebas Neue'; font-size:1.6em; line-height:1; }
        .zc-lbl { font-size:9px; color:var(--muted); text-transform:uppercase; }

        #main-title { font-family: 'Bebas Neue', sans-serif; font-size: 2em; letter-spacing: .08em; margin: 16px 0 4px; }
        .admin-link { font-size: 11px; color: #333; margin-top: 60px; cursor: pointer; text-align: center; display: block; }
    </style>
</head>
<body>

<div id="lesson-banner" class="banner hidden">
    <div class="banner-dot"></div>
    SESSION EN COURS : <span id="cur-lesson-name" style="color:var(--prof)">---</span>
</div>

<div class="container">
    <h2 id="main-title">🏋️ Muscu Connect+</h2>

    <div id="auth-screen" class="card">
        <h3>Identification</h3>
        <select id="classe" onchange="majEleves()">
            <option value="">-- Classe --</option>
            <option>3A</option><option>3B</option><option>3C</option><option>3D</option>
        </select>
        <select id="eleve"><option value="">-- Numéro --</option></select>
        <button class="btn-primary" onclick="connexion()">Entrer →</button>
    </div>

    <div id="app-eleve" class="hidden">
        <div class="card" id="input-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <span id="user-info" style="font-weight:600; font-size:13px;"></span>
                <span onclick="location.reload()" style="color:var(--muted); font-size:12px; text-decoration:underline; cursor:pointer;">Quitter</span>
            </div>

            <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>

            <div class="zone-counters">
                <div class="zone-counter"><div class="zc-num" id="cnt-haut" style="color:var(--haut)">0</div><div class="zc-lbl">Haut</div></div>
                <div class="zone-counter"><div class="zc-num" id="cnt-bas"  style="color:var(--bas)">0</div><div class="zc-lbl">Bas</div></div>
                <div class="zone-counter"><div class="zc-num" id="cnt-tronc" style="color:var(--tronc)">0</div><div class="zc-lbl">Tronc</div></div>
                <div class="zone-counter"><div class="zc-num" id="cnt-cardio" style="color:var(--cardio)">0</div><div class="zc-lbl">Cardio</div></div>
            </div>

            <select id="atelier" onchange="majExercices()">
                <option value="">-- Choisir un atelier --</option>
                <optgroup label="💪 HAUT DU CORPS" data-zone="haut">
                    <option value="Pectoraux">Pectoraux</option>
                    <option value="Biceps">Biceps</option>
                    <option value="Triceps">Triceps</option>
                    <option value="Trapèzes">Trapèzes</option>
                </optgroup>
                <optgroup label="🦵 BAS DU CORPS" data-zone="bas">
                    <option value="Quadriceps">Quadriceps</option>
                    <option value="Ischios">Ischios</option>
                    <option value="Fessiers">Fessiers</option>
                    <option value="Mollets">Mollets</option>
                </optgroup>
                <optgroup label="🧘 TRONC" data-zone="tronc">
                    <option value="Abdominaux">Abdominaux</option>
                    <option value="Obliques">Obliques</option>
                    <option value="Grand Dorsal">Grand Dorsal</option>
                </optgroup>
                <optgroup label="❤️ CARDIO" data-zone="cardio">
                    <option value="Jumping Jack">Jumping Jack</option>
                    <option value="Mountain Climber">Mountain Climber</option>
                    <option value="Burpees">Burpees</option>
                </optgroup>
            </select>
            
            <select id="exercice" onchange="majUI()" class="hidden"></select>

            <div id="f-std" class="hidden">
                <div class="row">
                    <select id="kg" onchange="validateInputs()">
                        <option value="">-- Charge --</option>
                        <option value="PDC">Poids de corps (PDC)</option>
                    </select>
                    <input type="number" id="reps" placeholder="Reps" inputmode="numeric" oninput="validateInputs()">
                </div>
            </div>

            <div id="f-alt" class="hidden">
                <input type="number" id="val-alt" placeholder="Reps ou Secondes" inputmode="numeric">
            </div>

            <div id="f-elastique" class="hidden">
                <p style="font-size:12px; color:var(--muted); margin:6px 0;">Couleur de l'élastique :</p>
                <div style="display:flex; gap:6px; margin-bottom:10px;">
                    <div id="el-Vert" style="flex:1; padding:10px; border-radius:8px; background:#27ae60; color:#fff; text-align:center; font-weight:700; cursor:pointer;" onclick="selectElastique('Vert')">Vert</div>
                    <div id="el-Rouge" style="flex:1; padding:10px; border-radius:8px; background:#e74c3c; color:#fff; text-align:center; font-weight:700; cursor:pointer;" onclick="selectElastique('Rouge')">Rouge</div>
                    <div id="el-Noir" style="flex:1; padding:10px; border-radius:8px; background:#2c2c2c; color:#fff; text-align:center; font-weight:700; cursor:pointer;" onclick="selectElastique('Noir')">Noir</div>
                </div>
                <input type="hidden" id="val-elastique">
                <input type="number" id="reps-el" placeholder="Répétitions" inputmode="numeric">
            </div>

            <select id="ressenti">
                <option value="">-- Ressenti ? --</option>
                <option value="😄">😄 Facile</option>
                <option value="🙂">🙂 Bien</option>
                <option value="😫">😫 Difficile</option>
            </select>

            <div class="rm-feedback" id="rm-feedback"></div>
            <button class="btn-primary" onclick="sauverSérie()">✅ Valider l'atelier</button>
        </div>

        <div class="card">
            <h4>📊 Mes Performances</h4>
            <table>
                <thead><tr><th>Atelier</th><th>Exercice</th><th>Perf.</th><th>1RM</th><th>😊</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
            <button onclick="ouvrirBilanFinal()" class="btn-prof" style="margin-top:15px;">📤 Envoyer le bilan final</button>
        </div>
    </div>

    <div id="app-prof" class="hidden">
        <div class="card" style="border-top-color: var(--prof);">
            <h3>🎓 Espace Professeur</h3>
            <input type="text" id="lesson-input" placeholder="Nom de la séance (ex: Séance 1)">
            <div class="row">
                <button class="btn-prof" onclick="setSession(true)">▶ Démarrer la séance</button>
                <button class="btn-danger" onclick="setSession(false)">■ Arrêter</button>
            </div>
            <h4 style="margin-top:20px;">📢 Flux en direct</h4>
            <div id="live-feed" class="live-feed"></div>
            <button onclick="location.reload()" class="btn-ghost" style="margin-top:20px;">Retour Écran Élève</button>
        </div>
    </div>

    <span class="admin-link" onclick="accessProf()">Accès Professeur</span>
</div>

<div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-box">
        <h3 style="font-family:'Bebas Neue'; color:var(--prof); font-size:1.8em;">Bilan de séance</h3>
        <canvas id="radarChart" style="max-height:250px; margin-bottom:15px;"></canvas>
        <textarea id="bilan-texte" rows="3" placeholder="Qu'as-tu appris aujourd'hui ?"></textarea>
        <button onclick="confirmerEnvoi()" class="btn-prof">Confirmer l'envoi au professeur</button>
        <button onclick="document.getElementById('modal-overlay').classList.add('hidden')" class="btn-ghost" style="margin-top:8px;">Fermer</button>
    </div>
</div>

<script>
// --- CONFIGURATION FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyCEYWqZ9GGwWHZ4mEUS4HgaZL03hXlKpcE",
  authDomain: "muscu-3e.firebaseapp.com",
  projectId: "muscu-3e",
  storageBucket: "muscu-3e.firebasestorage.app",
  messagingSenderId: "1023879929115",
  appId: "1:1023879929115:web:bc4b71e0a647aaae1047be",
  databaseURL: "https://muscu-3e-default-rtdb.europe-west1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const rdb = firebase.database();

let user = "", lesson = "", dataEleve = {}, radarChartInstance = null;

const ALT_EXOS = ["Crunchs","Sit-Up","Hollow","Russian Twist","Touche Talons","Crunch Pédalos","Arlaud","Arlaud Dynamique","Chaise","Jumping Jack","Star Jump","Corde à Sauter","Mountain Climber Bloqué","Mountain Climber Dynamique","Mountain Climber Crossfit","Marche de l'Ours","Sprawl","Burpees","Relevé de Bassin","Relevé de Bassin 1 Jambe","Relevé de Bassin Dynamique","Fentes Bulgares","Fentes","Fentes Sautées","Squats Sautés","Montées Descentes"];
const ELASTIQUE_EXOS = ["Dips","Tirage Bras Tendus","Rameur Élastique"];

const EXERCICES = {
    "Pectoraux": { zone:"haut", list:["Pompes","Développé Couché","Butterfly"] },
    "Biceps": { zone:"haut", list:["Curl Biceps","Curl Marteau","Curl TRX"] },
    "Triceps": { zone:"haut", list:["Triceps Extension","Triceps Kicks","Dips"] },
    "Trapèzes": { zone:"haut", list:["Tirage Bras Tendus","Tirage Kettlebell","Presse Épaule"] },
    "Quadriceps": { zone:"bas", list:["Squats","Chaise","Squats Sautés"] },
    "Ischios": { zone:"bas", list:["Relevé de Bassin","Relevé de Bassin 1 Jambe","Relevé de Bassin Dynamique"] },
    "Fessiers": { zone:"bas", list:["Fentes Bulgares","Fentes","Fentes Sautées"] },
    "Mollets": { zone:"bas", list:["Montées Descentes","Montées avec Poids","Montées Kettlebell"] },
    "Abdominaux": { zone:"tronc", list:["Crunchs","Sit-Up","Hollow"] },
    "Obliques": { zone:"tronc", list:["Russian Twist","Touche Talons","Crunch Pédalos"] },
    "Grand Dorsal": { zone:"tronc", list:["Arlaud","Arlaud Dynamique","Rameur Élastique"] },
    "Jumping Jack": { zone:"cardio", list:["Jumping Jack","Star Jump","Corde à Sauter"] },
    "Mountain Climber": { zone:"cardio", list:["Mountain Climber Bloqué","Mountain Climber Dynamique","Mountain Climber Crossfit"] },
    "Burpees": { zone:"cardio", list:["Marche de l'Ours","Sprawl","Burpees"] }
};

// Initialisation Kg Select
const kgSel = document.getElementById("kg");
for(let i=1; i<=150; i++) { kgSel.innerHTML += `<option value="${i}">${i} kg</option>`; }

function majEleves() {
    const s = document.getElementById("eleve");
    s.innerHTML = '<option value="">-- Numéro --</option>';
    for (let i = 1; i <= 30; i++) s.innerHTML += `<option value="${i}">${i}</option>`;
}

function connexion() {
    const c = document.getElementById("classe").value;
    const e = document.getElementById("eleve").value;
    if (!c || !e) return;
    user = c + "_" + e;
    document.getElementById("auth-screen").classList.add("hidden");
    document.getElementById("app-eleve").classList.remove("hidden");
    document.getElementById("user-info").innerText = `👤 ${c} – n°${e}`;
    const saved = localStorage.getItem("session_" + user);
    if (saved) dataEleve = JSON.parse(saved);
    initTableau();
}

function majExercices() {
    const at = document.getElementById("atelier").value;
    const exSel = document.getElementById("exercice");
    if (!at) return;
    const { zone, list } = EXERCICES[at];
    exSel.innerHTML = '<option value="">-- Exercice --</option>' + list.map(e => `<option value="${e}">${e}</option>`).join("");
    exSel.classList.remove("hidden");
    document.getElementById("input-card").className = `card z-${zone}`;
}

function majUI() {
    const ex = document.getElementById("exercice").value;
    document.getElementById("f-std").className = (!ALT_EXOS.includes(ex) && !ELASTIQUE_EXOS.includes(ex)) ? "" : "hidden";
    document.getElementById("f-alt").className = ALT_EXOS.includes(ex) ? "" : "hidden";
    document.getElementById("f-elastique").className = ELASTIQUE_EXOS.includes(ex) ? "" : "hidden";
}

function selectElastique(c) {
    document.getElementById("val-elastique").value = c;
    ["Vert","Rouge","Noir"].forEach(col => document.getElementById("el-"+col).style.border = "none");
    document.getElementById("el-"+c).style.border = "3px solid white";
}

function validateInputs() {
    const kg = document.getElementById("kg").value;
    const reps = Number(document.getElementById("reps").value);
    const fb = document.getElementById("rm-feedback");
    if (kg && reps > 0) {
        let label = "", color = "", rmTxt = "";
        if (kg !== "PDC" && reps <= 20) {
            const rm = Math.round(kg / (1.0278 - 0.0278 * reps));
            rmTxt = ` | 1RM : ${rm}kg`;
        }
        if (reps <= 6) { label = "FORCE"; color = "#ff1744"; }
        else if (reps <= 12) { label = "VOLUME"; color = "#d500f9"; }
        else { label = "TONIFICATION"; color = "#00e676"; }
        fb.style.display = "block";
        fb.style.borderLeftColor = color;
        fb.innerHTML = `<b style="color:${color}">${label}</b>${rmTxt}`;
    } else fb.style.display = "none";
}

function sauverSérie() {
    const at = document.getElementById("atelier").value, ex = document.getElementById("exercice").value, res = document.getElementById("ressenti").value;
    if (!at || !ex || !res) return;
    let p = "", rm = "-";
    const z = EXERCICES[at].zone;
    if (ELASTIQUE_EXOS.includes(ex)) { p = `Elas. ${document.getElementById("val-elastique").value} × ${document.getElementById("reps-el").value}`; }
    else if (ALT_EXOS.includes(ex)) { p = document.getElementById("val-alt").value + " reps/sec"; }
    else {
        const kg = document.getElementById("kg").value, r = document.getElementById("reps").value;
        p = (kg === "PDC" ? "PDC" : kg + "kg") + " × " + r;
        if (kg !== "PDC" && r <= 20) rm = Math.round(kg / (1.0278 - 0.0278 * r)) + " kg";
    }
    dataEleve[at] = { z, ex, p, rm, res };
    localStorage.setItem("session_" + user, JSON.stringify(dataEleve));
    rdb.ref("live").push({ u: user, at, ex, p, res });
    initTableau();
    resetForm();
}

function resetForm() {
    document.getElementById("atelier").value = "";
    document.getElementById("exercice").classList.add("hidden");
    ["f-std","f-alt","f-elastique"].forEach(f => document.getElementById(f).classList.add("hidden"));
    document.getElementById("rm-feedback").style.display = "none";
}

function initTableau() {
    const b = document.getElementById("table-body"); b.innerHTML = "";
    Object.keys(dataEleve).forEach(at => {
        const d = dataEleve[at];
        b.innerHTML += `<tr><td>${at}</td><td>${d.ex}</td><td style="color:var(--haut)">${d.p}</td><td>${d.rm}</td><td>${d.res}</td></tr>`;
    });
    updateCounters();
}

function updateCounters() {
    const counts = { haut:0, bas:0, tronc:0, cardio:0 };
    Object.values(dataEleve).forEach(d => counts[d.z]++);
    for(let z in counts) document.getElementById("cnt-"+z).innerText = counts[z];
    document.getElementById("progress-bar").style.width = (Object.keys(dataEleve).length / 14 * 100) + "%";
}

function setSession(active) {
    const name = document.getElementById("lesson-input").value || "Séance";
    rdb.ref("config/active").set({ status: active, name: name });
}

function accessProf() {
    if (prompt("Code :") === "16170") {
        document.getElementById("app-eleve").classList.add("hidden");
        document.getElementById("app-prof").classList.remove("hidden");
        // Ecouter le flux live
        rdb.ref("live").limitToLast(10).on("child_added", s => {
            const d = s.val();
            const div = document.createElement("div"); div.className = "live-entry";
            div.innerHTML = `<b>${d.u}</b> : ${d.at} (${d.p}) ${d.res}`;
            const feed = document.getElementById("live-feed");
            feed.prepend(div);
        });
    }
}

// --- ÉCOUTEUR DE SESSION (IMPORTANT POUR LE BANDEAU) ---
rdb.ref("config/active").on("value", s => {
    const data = s.val();
    const banner = document.getElementById("lesson-banner");
    if (data && data.status) {
        lesson = data.name;
        banner.classList.remove("hidden");
        document.getElementById("cur-lesson-name").innerText = lesson;
    } else {
        banner.classList.add("hidden");
    }
});

function ouvrirBilanFinal() {
    document.getElementById("modal-overlay").classList.remove("hidden");
    setTimeout(initRadar, 100);
}

function initRadar() {
    const ctx = document.getElementById('radarChart').getContext('2d');
    const vals = ['haut','bas','tronc','cardio'].map(z => Object.values(dataEleve).filter(d => d.z === z).length);
    if (radarChartInstance) radarChartInstance.destroy();
    radarChartInstance = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['Haut', 'Bas', 'Tronc', 'Cardio'],
            datasets: [{ label: 'Ateliers', data: vals, backgroundColor: 'rgba(213,0,249,0.2)', borderColor: '#d500f9' }]
        },
        options: { scales: { r: { beginAtZero: true, max: 5 } } }
    });
}

function confirmerEnvoi() {
    const bilanTxt = document.getElementById("bilan-texte").value;
    rdb.ref(`data/${lesson}/${user}`).set({ ateliers: dataEleve, bilan: bilanTxt, date: new Date().toLocaleDateString() }).then(() => {
        alert("Bilan envoyé ! Bravo pour ta séance.");
        localStorage.removeItem("session_" + user);
        location.reload();
    });
}
</script>
</body>
</html>
