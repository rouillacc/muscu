<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EPS Muscu Connect+</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --haut: #00e676; --bas: #ff1744; --tronc: #ffd740; --cardio: #40c4ff;
            --prof: #d500f9; --bg: #0d0d0d; --surface: #161616; --surface2: #222;
            --border: rgba(255,255,255,0.1); --text: #f0f0f0; --muted: #888;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .card { background: var(--surface); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); }
        h3, h4 { font-family: 'Bebas Neue', sans-serif; margin: 0 0 10px 0; }
        
        select, input, textarea { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: #fff; font-size: 16px; }
        button { width: 100%; padding: 15px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; margin-top: 5px; }
        .btn-primary { background: var(--haut); color: #000; }
        .btn-prof { background: var(--prof); color: #fff; }
        .btn-danger { background: var(--bas); color: #fff; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }

        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th { background: #1a1a1a; color: var(--muted); padding: 8px; text-transform: uppercase; }
        td { padding: 10px 5px; border-bottom: 1px solid #1a1a1a; text-align: center; }
        .badge { padding: 3px 6px; border-radius: 4px; font-weight: 900; color: #000; font-size: 9px; display: inline-block; }

        /* --- STYLE D'IMPRESSION --- */
        @media print {
            @page { margin: 1cm; }
            body { background: white !important; color: black !important; }
            .container, .no-print, button, select, #lesson-banner { display: none !important; }
            #print-zone { display: block !important; }
            .page-eleve { 
                page-break-after: always; /* Un élève par page */
                border-bottom: 2px solid #000;
                padding-bottom: 20px;
                margin-bottom: 20px;
            }
            table { border: 1px solid #000 !important; width: 100%; margin-bottom: 20px; }
            th, td { border: 1px solid #000 !important; color: black !important; padding: 8px; }
            .badge { border: 1px solid #000 !important; background: transparent !important; color: black !important; }
        }

        #print-zone { display: none; }
        .hidden { display: none !important; }
        .live-feed { background: #000; border-radius: 12px; padding: 10px; font-family: monospace; height: 150px; overflow-y: auto; color: var(--haut); border: 1px solid #222; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; font-family:'Bebas Neue'; color: var(--haut);">🏋️ EPS MUSCU CONNECT</h2>

    <div id="auth-screen" class="card">
        <h3>Connexion</h3>
        <select id="classe" onchange="majEleves()"><option value="">-- Classe --</option><option>3A</option><option>3B</option></select>
        <select id="eleve"><option value="">-- Nom --</option></select>
        <button class="btn-primary" onclick="connexion()">ENTRER</button>
    </div>

    <div id="app-eleve" class="hidden">
        <div class="card" id="input-card">
            <span id="user-info" style="font-weight:700; color:var(--prof);"></span>
            <select id="atelier" onchange="majExercices()">
                <option value="">-- Atelier --</option>
                <option value="Pectoraux">Pectoraux</option>
                <option value="Quadriceps">Quadriceps</option>
                <option value="Abdominaux">Abdominaux</option>
            </select>
            <input type="number" id="reps" placeholder="Nombre de répétitions">
            <button class="btn-primary" onclick="sauverSérie()">VALIDER SÉRIE</button>
        </div>

        <div class="card">
            <h4>MON TABLEAU</h4>
            <table>
                <thead><tr><th>Zone</th><th>Atelier</th><th>Perf</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
            <textarea id="bilan-texte" style="margin-top:15px;" placeholder="Écris ton bilan de séance ici..."></textarea>
            <button class="btn-prof" onclick="confirmerEnvoi()">ENVOYER AU PROF</button>
        </div>
    </div>

    <div id="app-prof" class="hidden">
        <div class="card" style="border-top: 4px solid var(--prof);">
            <h3>ESPACE PROFESSEUR</h3>
            <div id="live-feed" class="live-feed"></div>
            
            <div style="margin-top: 15px; display: grid; gap: 10px;">
                <button class="btn-primary" onclick="imprimerTouteLaClasse()">🖨️ IMPRIMER TOUS LES BILANS</button>
                <button class="btn-ghost" onclick="document.getElementById('fileInput').click()">📁 IMPORTER CSV ÉLÈVES</button>
                <input type="file" id="fileInput" accept=".csv" class="hidden" onchange="importCSV(event)">
                <button class="btn-danger" style="background:#333;" onclick="gestionDonnees()">🛠️ EFFACER LES DONNÉES</button>
                <button class="btn-ghost" onclick="location.reload()">RETOUR ACCUEIL</button>
            </div>
        </div>
    </div>
    
    <span style="opacity:0.1; font-size:10px; cursor:pointer; display:block; text-align:center; margin-top:20px;" onclick="accessProf()">Admin Prof</span>
</div>

<div id="print-zone"></div>

<script>
// CONFIG FIREBASE (Utilise ta config actuelle)
const firebaseConfig = {
  apiKey: "AIzaSyCEYWqZ9GGwWHZ4mEUS4HgaZL03hXlKpcE",
  authDomain: "muscu-3e.firebaseapp.com",
  projectId: "muscu-3e",
  databaseURL: "https://muscu-3e-default-rtdb.europe-west1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const rdb = firebase.database();

let user = "", dataEleve = {}, currentLesson = "Seance_1", listeEleves = ["Elève 1", "Elève 2"];

function majEleves() {
    const s = document.getElementById("eleve");
    s.innerHTML = '<option value="">-- Nom --</option>';
    listeEleves.forEach(e => s.innerHTML += `<option value="${e}">${e}</option>`);
}

function connexion() {
    const c = document.getElementById("classe").value, e = document.getElementById("eleve").value;
    if(!c || !e) return;
    user = c + "_" + e;
    document.getElementById("auth-screen").classList.add("hidden");
    document.getElementById("app-eleve").classList.remove("hidden");
    document.getElementById("user-info").innerText = user;
}

function sauverSérie() {
    const at = document.getElementById("atelier").value;
    const r = document.getElementById("reps").value;
    if(!at || !r) return;
    dataEleve[at] = { z: "haut", p: r + " reps", res: "🙂" };
    rdb.ref("live").push({ u: user, at, p: r });
    majTableau();
}

function majTableau() {
    const b = document.getElementById("table-body"); b.innerHTML = "";
    Object.keys(dataEleve).forEach(at => {
        const d = dataEleve[at];
        b.innerHTML += `<tr><td><span class="badge" style="background:var(--${d.z})">${d.z}</span></td><td>${at}</td><td>${d.p}</td></tr>`;
    });
}

function confirmerEnvoi() {
    const bilan = document.getElementById("bilan-texte").value;
    rdb.ref(`data/${currentLesson}/${user}`).set({ ateliers: dataEleve, bilan: bilan, date: new Date().toLocaleDateString() })
    .then(() => { alert("Séance terminée et envoyée !"); location.reload(); });
}

function accessProf() {
    if(prompt("Code")==="16170") {
        document.getElementById("auth-screen").classList.add("hidden");
        document.getElementById("app-prof").classList.remove("hidden");
        rdb.ref("live").on("child_added", s => {
            const d = s.val(), f = document.getElementById("live-feed");
            const div = document.createElement("div"); div.innerHTML = `<b>${d.u}</b>: ${d.at} (${d.p})`;
            f.prepend(div);
        });
    }
}

// --- LOGIQUE D'IMPRESSION GROUPÉE ---
function imprimerTouteLaClasse() {
    rdb.ref(`data/${currentLesson}`).once("value", s => {
        const classData = s.val();
        if(!classData) { alert("Aucune donnée enregistrée pour cette leçon."); return; }
        
        let printHTML = `<h1 style="text-align:center; color: black;">COMPTE-RENDU DE CLASSE - ${currentLesson}</h1>`;
        
        for (let userId in classData) {
            const eleve = classData[userId];
            printHTML += `
                <div class="page-eleve">
                    <h2 style="border-bottom: 2px solid #000;">Élève : ${userId.replace('_',' ')}</h2>
                    <p>Date : ${eleve.date || 'Non renseignée'}</p>
                    
                    <table border="1">
                        <thead>
                            <tr><th>Atelier</th><th>Performance</th><th>Ressenti</th></tr>
                        </thead>
                        <tbody>`;
            
            for (let at in eleve.ateliers) {
                const a = eleve.ateliers[at];
                printHTML += `<tr><td>${at}</td><td>${a.p}</td><td>${a.res || '-'}</td></tr>`;
            }

            printHTML += `
                        </tbody>
                    </table>
                    <div style="margin-top:10px;">
                        <strong>Bilan de l'élève :</strong>
                        <p style="border: 1px solid #ccc; padding: 10px; background: #f9f9f9;">${eleve.bilan || "Aucun bilan rédigé."}</p>
                    </div>
                    <div style="margin-top:20px; font-style: italic;">
                        <strong>Commentaires du professeur :</strong>
                        <div style="border-bottom: 1px dashed #000; height: 30px;"></div>
                    </div>
                </div>`;
        }
        
        document.getElementById("print-zone").innerHTML = printHTML;
        window.print();
    });
}

function gestionDonnees() {
    const m = prompt("1: Effacer LIVE | 2: Effacer TOUTE LA LEÇON");
    if(m === "1") rdb.ref("live").remove();
    if(m === "2") { if(confirm("Voulez-vous vraiment TOUT effacer ?")) rdb.ref(`data/${currentLesson}`).remove(); }
}

function importCSV(event) {
    const file = event.target.files[0];
    const reader = new FileReader();
    reader.onload = function(e) {
        const lines = e.target.result.split('\n');
        listeEleves = lines.map(l => l.split(',')[0].trim()).filter(l => l !== "");
        majEleves();
        alert("Liste des élèves mise à jour !");
    };
    reader.readAsText(file);
}
</script>
</body>
</html>
