<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EPS Muscu Rouillac</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --haut: #00e676; --bas: #ff1744; --tronc: #ffd740; --cardio: #40c4ff;
            --prof: #d500f9; --bg: #0d0d0d; --surface: #161616; --surface2: #222;
            --border: rgba(255,255,255,0.1); --text: #f0f0f0; --muted: #444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        .banner { background: #1a1a1a; border-bottom: 2px solid var(--prof); padding: 12px; font-weight: 700; position: sticky; top: 0; z-index: 1000; text-align: center; display: flex; justify-content: space-between; align-items: center; }
        .btn-home { background: #333; color: #fff; border: 1px solid var(--border); padding: 5px 10px; border-radius: 8px; font-size: 10px; cursor: pointer; text-transform: uppercase; }
        .card { background: var(--surface); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        h3, h4 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; margin: 0 0 10px 0; }
        select, input, textarea { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: #fff; font-size: 16px; }
        button { width: 100%; padding: 15px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; }
        .btn-primary { background: var(--haut); color: #000; }
        .btn-prof { background: var(--prof); color: #fff; }
        .btn-danger { background: var(--bas); color: #fff; }
        .table-container { background: #000; border-radius: 15px; border: 1px solid var(--border); overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; min-width: 600px; }
        th { background: #1a1a1a; color: #888; padding: 10px 5px; text-transform: uppercase; font-size: 8px; }
        td { padding: 12px 6px; border-bottom: 1px solid #1a1a1a; text-align: center; color: var(--muted); }
        tr.completed td { color: #fff; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 8px; font-weight: 900; color: #000; text-transform: uppercase; display: inline-block; opacity: 0.3; }
        .badge-active { opacity: 1 !important; }
        .badge-haut { background: var(--haut); } .badge-bas { background: var(--bas); color: #fff; } .badge-tronc { background: var(--tronc); } .badge-cardio { background: var(--cardio); }
        .hidden { display: none !important; }
        .live-feed { background: #000; border-radius: 12px; padding: 10px; font-family: monospace; font-size: 11px; height: 120px; overflow-y: auto; color: #00e676; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="lesson-banner" class="banner hidden">
    <button class="btn-home" onclick="location.reload()">🏠 ACCUEIL</button>
    <span id="cur-lesson-name">SESSION ACTIVE</span>
    <div style="width:60px"></div>
</div>

<div class="container">
    <h2 style="text-align: center; font-family:'Bebas Neue'; color: var(--haut);">🏋️ EPS MUSCU ROUILLAC</h2>

    <div id="auth-screen" class="card">
        <h3>Identification</h3>
        <div id="studentLessonInfo" style="font-size:12px; color:#bbb; margin-bottom:8px;">Vérification de la séance...</div>
        <select id="classe"><option value="">-- Classe --</option></select>
        <select id="eleve"><option value="">Choisir d'abord une classe</option></select>
        <button class="btn-primary" onclick="connexion()" style="margin-top:10px;">DÉMARRER LA SÉANCE</button>
    </div>

    <div id="app-eleve" class="hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span id="user-info" style="font-weight:700; color:var(--prof);"></span>
                <button class="btn-home" onclick="location.reload()">Changer</button>
            </div>

            <select id="atelier" onchange="majExercices()">
                <option value="">-- Choisir Atelier --</option>
                <optgroup label="💪 HAUT" data-zone="haut"><option>Pectoraux</option><option>Biceps</option><option>Triceps</option><option>Trapèzes</option></optgroup>
                <optgroup label="🦵 BAS" data-zone="bas"><option>Quadriceps</option><option>Ischios</option><option>Fessiers</option><option>Mollets</option></optgroup>
                <optgroup label="🧘 TRONC" data-zone="tronc"><option>Abdominaux</option><option>Obliques</option><option>Gainage</option><option>Grand Dorsal</option></optgroup>
                <optgroup label="❤️ CARDIO" data-zone="cardio"><option>Jumping Jack</option><option>Mountain Climber</option><option>Burpees</option></optgroup>
            </select>

            <select id="exercice" onchange="majUI()" class="hidden"></select>

            <div id="fields-zone" class="hidden">
                <div class="row"><select id="series"><option value="">Séries</option><script>for(let i=1; i<=6; i++) document.write(`<option value="${i}">${i} série(s)</option>`);</script></select></div>
                
                <div id="f-std" class="hidden"><div class="row" style="display:flex; gap:5px;"><select id="kg" style="flex:1;"><option value="PDC">PDC</option><script>for(let i=1; i<=80; i++) document.write(`<option value="${i}">${i} kg</option>`);</script></select><input type="number" id="reps" placeholder="Reps" style="flex:1;" inputmode="numeric"></div></div>
                <div id="f-alt" class="hidden"><input type="number" id="val-alt" placeholder="Reps ou Secondes" inputmode="numeric"></div>
                
                <select id="ressenti"><option value="(+) Simple">(+) Simple</option><option value="(=) Efficace" selected>(=) Efficace</option><option value="(-) Difficile">(-) Difficile</option></select>
                <button class="btn-primary" onclick="sauverSérie()">VALIDER</button>
            </div>
        </div>

        <div class="card">
            <h4>📊 MA FEUILLE DE ROUTE</h4>
            <div class="table-container">
                <table>
                    <thead><tr><th>Zone</th><th>Atelier</th><th>Exercice</th><th>Séries</th><th>Est. Max</th><th>Perf</th><th>Avis</th></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="app-prof" class="hidden">
        <div class="card">
            <h3>CONSOLE PROF</h3>
            <input type="text" id="lesson-input" placeholder="Nom séance">
            <button class="btn-primary" onclick="createLesson()">OUVRIR LA SÉANCE</button>
            <h4 style="margin-top:15px;">Classes</h4>
            <input type="text" id="class-name-input" placeholder="Ex: 3A">
            <input type="file" id="class-file-input">
            <button class="btn-prof" onclick="importClassFromCSV()" style="margin-top:5px;">IMPORTER</button>
            <div id="live-feed" class="live-feed" style="margin-top:15px;"></div>
        </div>
    </div>

    <button style="display:block; margin:20px auto; background:transparent; border:none; color:#222;" onclick="accessProf()">[ Prof ]</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCEYWqZ9GGwWHZ4mEUS4HgaZL03hXlKpcE",
  authDomain: "muscu-3e.firebaseapp.com",
  projectId: "muscu-3e",
  databaseURL: "https://muscu-3e-default-rtdb.europe-west1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const rdb = firebase.database();

const LISTE_ATELIERS = [
    { n: "Pectoraux", z: "haut" }, { n: "Biceps", z: "haut" }, { n: "Triceps", z: "haut" }, { n: "Trapèzes", z: "haut" },
    { n: "Quadriceps", z: "bas" }, { n: "Ischios", z: "bas" }, { n: "Fessiers", z: "bas" }, { n: "Mollets", z: "bas" },
    { n: "Abdominaux", z: "tronc" }, { n: "Obliques", z: "tronc" }, { n: "Gainage", z: "tronc" }, { n: "Grand Dorsal", z: "tronc" },
    { n: "Jumping Jack", z: "cardio" }, { n: "Mountain Climber", z: "cardio" }, { n: "Burpees", z: "cardio" }
];

const EXERCICES = {
    "Pectoraux": ["Pompes","Développé Couché","Butterfly"],
    "Biceps": ["Curl Biceps","Curl Marteau","Curl TRX"],
    "Triceps": ["Triceps Extension","Triceps Kicks","Dips"],
    "Trapèzes": ["Tirage Bras Tendus","Tirage KB","Presse Épaule"],
    "Quadriceps": ["Squats","Chaise","Squats Sautés"],
    "Ischios": ["Relevé Bassin","Bassin 1 Jambe","Bassin Dyn"],
    "Fessiers": ["Fentes Bulgares","Fentes","Fentes Sautées"],
    "Mollets": ["Mollets","Montées Poids","Montées KB"],
    "Abdominaux": ["Crunchs","Sit-Up","Hollow"],
    "Obliques": ["Russian Twist","Touche Talons","Crunch Pédalo"],
    "Gainage": ["Gainage statique","Gainage dynamique","Gainage étoile"],
    "Grand Dorsal": ["Arlaud","Arlaud Dyn","Rameur"],
    "Jumping Jack": ["Jumping Jack","Star Jump","Corde"],
    "Mountain Climber": ["M. Climber Bloqué","M. Climber Dyn","M. Climber Cross"],
    "Burpees": ["Marche Ours","Sprawl","Burpees"]
};

const ALT_EXOS = ["Crunchs","Sit-Up","Hollow","Russian Twist","Touche Talons","Crunch Pédalo","Arlaud","Arlaud Dyn","Chaise","Gainage statique","Gainage dynamique","Gainage étoile"];

let currentActiveLessonId = "";
let currentLessonName = "";
let user = "";
let dataEleve = {};

// INITIALISATION
window.onload = async function() {
    try {
        await loadClasses();
        listenToActiveLesson();
    } catch(e) { console.error("Erreur chargement:", e); }
};

async function loadClasses() {
    const snap = await rdb.ref("classes").once("value");
    const raw = snap.val() || {};
    const sel = document.getElementById("classe");
    sel.innerHTML = '<option value="">-- Classe --</option>';
    Object.keys(raw).forEach(id => {
        let opt = document.createElement("option");
        opt.value = id;
        opt.textContent = raw[id].className || id;
        sel.appendChild(opt);
    });
}

function listenToActiveLesson() {
    rdb.ref("config/active").on("value", snap => {
        const d = snap.val();
        const info = document.getElementById("studentLessonInfo");
        if(d) {
            currentActiveLessonId = d.lessonId;
            currentLessonName = d.name;
            info.textContent = "Séance : " + d.name;
            info.style.color = "#00e676";
            document.getElementById("lesson-banner").classList.remove("hidden");
            document.getElementById("cur-lesson-name").textContent = d.name;
        } else {
            info.textContent = "Aucune séance active.";
            info.style.color = "#ff1744";
        }
    });
}

document.getElementById("classe").onchange = async function() {
    const classId = this.value;
    const sel = document.getElementById("eleve");
    sel.innerHTML = '<option value="">-- Élève --</option>';
    if(!classId) return;
    const snap = await rdb.ref(`classes/${classId}/students`).once("value");
    const students = snap.val() || {};
    Object.keys(students).sort().forEach(id => {
        let opt = document.createElement("option");
        opt.value = id;
        opt.textContent = students[id].nomComplet || id;
        sel.appendChild(opt);
    });
};

function connexion() {
    const c = document.getElementById("classe").value;
    const e = document.getElementById("eleve").value;
    if(!c || !e || !currentActiveLessonId) return alert("Sélectionne ta classe, ton nom et attends l'ouverture prof.");
    user = `${c}__${e}`;
    document.getElementById("auth-screen").classList.add("hidden");
    document.getElementById("app-eleve").classList.remove("hidden");
    document.getElementById("user-info").innerText = e;
    
    rdb.ref(`data/${currentActiveLessonId}/${user}/ateliers`).on("value", snap => {
        dataEleve = snap.val() || {};
        initTableau();
    });
}

function majExercices() {
    const at = document.getElementById("atelier").value;
    const exSel = document.getElementById("exercice");
    if(!at) return;
    exSel.innerHTML = '<option value="">-- Exercice --</option>' + EXERCICES[at].map(e => `<option value="${e}">${e}</option>`).join("");
    exSel.classList.remove("hidden");
    document.getElementById("fields-zone").classList.remove("hidden");
}

function majUI() {
    const ex = document.getElementById("exercice").value;
    document.getElementById("f-std").className = !ALT_EXOS.includes(ex) ? "" : "hidden";
    document.getElementById("f-alt").className = ALT_EXOS.includes(ex) ? "" : "hidden";
}

function sauverSérie() {
    const at = document.getElementById("atelier").value;
    const ex = document.getElementById("exercice").value;
    const ser = document.getElementById("series").value;
    const res = document.getElementById("ressenti").value;
    if(!at || !ex || !ser) return;

    let p = "", rm = "";
    if(ALT_EXOS.includes(ex)) {
        p = document.getElementById("val-alt").value + (ex.includes("Gainage") ? "s" : "r");
        rm = ex.includes("Gainage") ? "Maintien" : "Endurance";
    } else {
        let poids = document.getElementById("kg").value;
        let reps = document.getElementById("reps").value;
        p = `${poids}kg / ${reps}r`;
        rm = poids !== "PDC" ? Math.round(poids/(1.0278-(0.0278*reps))) + "kg" : "PDC";
    }

    const zone = LISTE_ATELIERS.find(a => a.n === at).z;
    dataEleve[at] = { at, z: zone, ex, ser, p, res, rm };
    rdb.ref(`data/${currentActiveLessonId}/${user}/ateliers`).set(dataEleve);
    
    document.getElementById("atelier").value = "";
    document.getElementById("exercice").classList.add("hidden");
    document.getElementById("fields-zone").classList.add("hidden");
}

function initTableau() {
    const b = document.getElementById("table-body");
    b.innerHTML = "";
    LISTE_ATELIERS.forEach(at => {
        const d = dataEleve[at.n];
        if(d) {
            b.innerHTML += `<tr class="completed"><td><span class="badge badge-active badge-${at.z}">${at.z}</span></td><td><b>${at.n}</b></td><td>${d.ex}</td><td>${d.ser}</td><td>${d.rm}</td><td style="color:var(--haut)">${d.p}</td><td>${d.res}</td></tr>`;
        } else {
            b.innerHTML += `<tr><td><span class="badge badge-${at.z}">${at.z}</span></td><td><b>${at.n}</b></td><td colspan="5" style="opacity:0.2">...</td></tr>`;
        }
    });
}

function accessProf() {
    if(prompt("Code") === "16170") {
        document.getElementById("auth-screen").classList.add("hidden");
        document.getElementById("app-prof").classList.remove("hidden");
    }
}

async function createLesson() {
    const n = document.getElementById("lesson-input").value || "Séance";
    const id = "L" + Date.now();
    await rdb.ref(`lessons/${id}`).set({ name: n, status: "active" });
    await rdb.ref("config/active").set({ lessonId: id, name: n });
    alert("Séance ouverte !");
}
</script>
</body>
</html>
